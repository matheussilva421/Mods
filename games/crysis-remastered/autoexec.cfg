# autoexec.cfg — Crysis Remastered Trainer (Steam Deck)
#
# Coloque este arquivo na RAIZ do jogo (a pasta onde fica a pasta Bin64).
# Caminhos comuns no Steam Deck:
#   ~/.steam/steam/steamapps/common/Crysis Remastered/
#   ~/.local/share/Steam/steamapps/common/Crysis Remastered/
#
# Estrutura correta:
#   Crysis Remastered/
#   ├── Bin64/
#   ├── autoexec.cfg  <- aqui
#   └── ...
#
# RECOMENDADO: adicione "-devmode" nas Opcoes de Inicializacao do Steam
# (clique com botao direito no jogo > Propriedades > Opcoes de Inicializacao).
# Alguns CVars (principalmente g_godMode) so funcionam com -devmode ativo.

# ── Desbloqueio de CVars restritas (deve vir primeiro) ─────────────────────
sys_RestrictedMode 0

# ── Invencibilidade / Vida infinita ────────────────────────────────────────
g_godMode 1

# ── Municao infinita (pentes nao diminuem) ─────────────────────────────────
i_unlimitedammo 1

# ── Energia do Nanosuit maxima ──────────────────────────────────────────────
pl_nanosuit_energy 99999
# Se a linha acima nao funcionar, tente descomentar a linha abaixo:
# pl_nanosuit_energy_max 99999

# ── Sem dano de queda ──────────────────────────────────────────────────────
pl_fallDamage_SpeedFatal 9999
pl_fallDamage_SpeedSafe 9999

# ── Opcoes extras (comentadas por padrao — remova o # para ativar) ──────────

# Velocidade de movimento (padrao ~1.0)
# pl_moveSpeed 2.0

# Altura de pulo (padrao ~1.0)
# pl_jumpHeight 2.0

# Campo de visao em graus (padrao 60)
# cl_fov 90
