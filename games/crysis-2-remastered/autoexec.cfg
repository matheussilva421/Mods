# autoexec.cfg — Crysis 2 Remastered Trainer
#
# Coloque este arquivo na RAIZ do jogo (mesma pasta onde esta a pasta Bin64).
# Caminhos comuns no Steam Deck:
#   ~/.steam/steam/steamapps/common/Crysis 2 Remastered/
#   ~/.local/share/Steam/steamapps/common/Crysis 2 Remastered/
#
# Estrutura correta:
#   Crysis 2 Remastered/
#   ├── Bin64/
#   ├── autoexec.cfg  <- aqui
#   └── ...
#
# RECOMENDADO: adicione "-devmode" nas Opcoes de Inicializacao do Steam
# (botao direito no jogo > Propriedades > Opcoes de Inicializacao).
# Sem -devmode o g_godMode pode ser ignorado em versoes retail.

# ── Desbloqueio de CVars restritas (deve vir primeiro) ─────────────────────
sys_RestrictedMode 0

# ── Invencibilidade / Vida infinita ────────────────────────────────────────
g_godMode 1

# ── Municao infinita ────────────────────────────────────────────────────────
i_unlimitedammo 1

# ── Nanosuit 2.0 — armadura maxima ──────────────────────────────────────────
g_suitArmorHealthValue 500

# ── Nanosuit 2.0 — cloak nao gasta energia ──────────────────────────────────
g_suitCloakEnergyDrainAdjuster 0

# ── Nanosuit 2.0 — modo de poder nao gasta energia ──────────────────────────
g_suitRecoilEnergyCost 0

# ── Regeneracao de energia instantanea ──────────────────────────────────────
g_suitEnergyRechargeTime 0
g_suitEnergyRechargeDelay 0

# ── Sem dano de queda ───────────────────────────────────────────────────────
pl_fallDamage_SpeedFatal 9999
pl_fallDamage_SpeedSafe 9999

# ── Opcoes extras (remova o # para ativar) ──────────────────────────────────

# Velocidade de movimento multiplicada (padrao 1.0)
# pl_moveSpeed 2.0

# Altura de pulo multiplicada (padrao 1.0)
# pl_jumpHeight 2.0

# Campo de visao em graus
# cl_fov 90

# Sem limite de velocidade maxima
# pl_maxSpeed 999

# Sem recuo de armas
# i_recoil_suppression 1
